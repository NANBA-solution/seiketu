<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seiketsu Design Assets Preview</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #dbe5f3;
      --text: #0b1d3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      letter-spacing: 0.02em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(11, 29, 58, 0.06);
    }
    .card h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
    }
    .asset {
      width: 100%;
      height: 380px;
      border: 0;
      display: block;
      background: #fff;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Seiketsu Assets Preview (Web)</h1>
    <section class="grid">
      <article class="card">
        <h2>Icon Set</h2>
        <object class="asset" type="image/svg+xml" data="./seiketsu_icon_set.svg"></object>
      </article>
      <article class="card">
        <h2>Illustration Set</h2>
        <object class="asset" type="image/svg+xml" data="./seiketsu_illustration_set.svg"></object>
      </article>
      <article class="card">
        <h2>Background Swatches</h2>
        <object class="asset" type="image/svg+xml" data="./seiketsu_bg_swatches.svg"></object>
      </article>
    </section>
    <p class="note">ローカルで開く場合はこのファイルをブラウザで直接開くか、ローカルサーバー経由で表示してください。</p>
  </main>
</body>
</html>
